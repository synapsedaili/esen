name: Daily Video Upload

on:
  schedule:
    - cron: '30 18 * * *' # TR 21:30
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          sudo sed -i 's/domain="path" rights="none" pattern="@\*"/domain="path" rights="read|write" pattern="@\*"/g' /etc/ImageMagick-6/policy.xml

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Pillow sürümü belirtmiyoruz, en güncelini kursun (derleme hatası almazsın)
          pip install moviepy==1.0.3 huggingface_hub google-api-python-client google-auth-httplib2 google-auth-oauthlib edge-tts nest-asyncio pillow numpy

      - name: Run Main Script
        env:
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          YT_TOKEN_EN: ${{ secrets.YT_TOKEN_EN }}
          YT_TOKEN_ES: ${{ secrets.YT_TOKEN_ES }}
        run: python main.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add current_index.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Video index updated"
          git push
