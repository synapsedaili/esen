name: Video Automation v3

on:
  schedule:
    - cron: '0 20 */2 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ImageMagick and Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick fonts-liberation
          sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml

      - name: Install Dependencies
        run: |
          pip install "moviepy>=2.0.0" edge-tts google-api-python-client google-auth-oauthlib requests huggingface_hub

      - name: Run Automation
        env:
          HF_REPO_ID: ${{ secrets.HF_REPO_ID }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          YT_TOKEN_ES: ${{ secrets.YT_TOKEN_ES }}
          YT_TOKEN_EN: ${{ secrets.YT_TOKEN_EN }}
        run: python main.py

      - name: Commit and Push Index
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          find . -name "=*2.0.0*" -delete
          git add current_index.txt
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Video #$(cat current_index.txt) uploaded"
            git push
          else
            echo "No changes to commit"
          fi
